<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Gaming Sunset Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8732a" />
      <stop offset="100%" stop-color="#c0392b" />
    </linearGradient>
    
    <!-- Intense Esports Neon Glow -->
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Premium Dark Background Shield -->
  <rect width="512" height="512" rx="128" fill="#0c0c0e" stroke="rgba(232, 115, 42, 0.15)" stroke-width="12"/>
  
  <!-- Outer Glow Cloud outline -->
  <path d="M 372 230 C 362 165 306 115 238 115 C 183 115 135 146 112 192 C 55 198 12 247 12 305 C 12 368 63 419 126 419 L 372 419 C 424 419 467 376 467 324 C 467 274 426 233 376 230" fill="url(#logoGrad)" opacity="0.08" />
  <path d="M 372 230 C 362 165 306 115 238 115 C 183 115 135 146 112 192 C 55 198 12 247 12 305 C 12 368 63 419 126 419 L 372 419 C 424 419 467 376 467 324 C 467 274 426 233 376 230" stroke="url(#logoGrad)" stroke-width="12" stroke-linejoin="round" opacity="0.3" fill="none" />
  
  <!-- Sharp Geometric Lightning Bolt representing cloud server speed -->
  <path d="M 276 70 L 156 260 L 236 260 L 206 430 L 326 240 L 246 240 L 276 70 Z" fill="url(#logoGrad)" filter="url(#logoGlow)" />
</svg>
